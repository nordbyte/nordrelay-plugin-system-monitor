name: Publish Packages

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      version:
        description: "Package version to publish. Must match package.json."
        required: true
        type: string

permissions:
  contents: read
  id-token: write
  packages: write

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  version-guard:
    name: Verify release version
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Verify package version matches release
        env:
          GITHUB_RELEASE_TAG: ${{ github.event.release.tag_name }}
          NORDRELAY_RELEASE_VERSION: ${{ inputs.version }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_REF_TYPE: ${{ github.ref_type }}
        run: node scripts/verify-release-version.mjs

  verify:
    name: Verify package
    runs-on: ubuntu-latest
    needs:
      - version-guard
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check
        run: npm run check

      - name: Test
        run: npm test

      - name: Package dry run
        run: npm pack --dry-run

  npm:
    name: npmjs.com
    runs-on: ubuntu-latest
    needs:
      - version-guard
      - verify
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          package_name="$(node -p "require('./package.json').name")"
          package_version="$(node -p "require('./package.json').version")"

          if npm view "${package_name}@${package_version}" version --registry=https://registry.npmjs.org >/dev/null 2>&1; then
            echo "${package_name}@${package_version} already exists on npm. Skipping."
            exit 0
          fi

          npm publish --access public --ignore-scripts --provenance --registry=https://registry.npmjs.org

  github-packages:
    name: GitHub Packages
    runs-on: ubuntu-latest
    needs:
      - version-guard
      - verify
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 22
          cache: npm
          registry-url: https://npm.pkg.github.com
          scope: "@nordbyte"

      - name: Install dependencies
        run: npm ci

      - name: Publish to GitHub Packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          package_name="$(node -p "require('./package.json').name")"
          package_version="$(node -p "require('./package.json').version")"

          if npm view "${package_name}@${package_version}" version --registry=https://npm.pkg.github.com >/dev/null 2>&1; then
            echo "${package_name}@${package_version} already exists on GitHub Packages. Skipping."
            exit 0
          fi

          npm publish --ignore-scripts --registry=https://npm.pkg.github.com
